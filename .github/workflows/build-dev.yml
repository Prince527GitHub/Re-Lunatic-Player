name: (DEV) Build App

on:
  push:
    paths-ignore:
      - 'README.md'
      - 'flake.lock'
      - 'flake.nix'
    branches:
      - dev
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest, windows-11-arm]

    permissions: write-all

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Update System
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt upgrade -y

      - name: Setup Python
        uses: actions/setup-python@v5
        if: matrix.os == 'macos-latest'
        with:
          python-version: '3.10'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install WiX
        if: matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          dotnet tool install --global wix
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install flatpak dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt install flatpak flatpak-builder elfutils -y
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install flathub org.freedesktop.Platform/x86_64/19.08 org.freedesktop.Sdk/x86_64/19.08 org.electronjs.Electron2.BaseApp/x86_64/stable -y

      - name: Install Packages
        run: pnpm i

      - name: Build App
        run: pnpm run make

      - name: Rename artifacts (Windows)
        if: matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm'
        shell: pwsh
        run: |
          Get-ChildItem -Path "out/make" -Recurse -File | ForEach-Object {
            $newName = $_.Name -replace ':', '-'
            if ($newName -ne $_.Name) {
              Rename-Item -Path $_.FullName -NewName $newName
            }
          }

      - name: Rename artifacts (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          find out/make -type f -name "*:*" | while read file; do
            newname=$(echo "$file" | sed 's/:/-/g')
            mv "$file" "$newname"
          done

      - name: Rename artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          find out/make -type f -name "*:*" | while read file; do
            newname=$(echo "$file" | sed 's/:/-/g')
            mv "$file" "$newname"
          done

      - name: Upload Artifacts (Windows)
        if: matrix.os == 'windows-latest' || matrix.os == 'windows-11-arm'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ matrix.os }}
          path: out/make/**/*
          if-no-files-found: warn

      - name: Upload Artifacts (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: out/make/**/*
          if-no-files-found: warn

      - name: Upload Artifacts (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: out/make/**/*
          if-no-files-found: warn
